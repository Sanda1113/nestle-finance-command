# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs
# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        # 🚀 FIX: Tell GitHub to look for the lock file in all subdirectories
        cache-dependency-path: '**/package-lock.json' 

    # 🚀 FIX: Add working-directory so npm commands run in the correct folder
    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm ci

    - name: Build Backend (if present)
      working-directory: ./backend
      run: npm run build --if-present

    - name: Test Backend
      working-directory: ./backend
      run: npm test --if-present

    # Optional: If you want GitHub to also check your frontend, uncomment these:
    # - name: Install Frontend Dependencies
    #   working-directory: ./frontend
    #   run: npm ci
    #
    # - name: Build Frontend
    #   working-directory: ./frontend
    #   run: npm run build --if-present
